<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLOTRANS — Iniciar sesión</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green-dark:  #1a5c2a;
    --green-main:  #2a7a3b;
    --green-mid:   #3a9b50;
    --green-light: #e8f5ec;
    --yellow:      #f0c93a;
    --gray-bg:     #f7f7f5;
    --gray-border: #e2e1dc;
    --text-main:   #1a1a18;
    --text-muted:  #6b6b66;
    --white:       #ffffff;
    --red:         #e74c3c;
  }

  html, body {
    height: 100%;
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
  }

  body {
    display: flex;
    min-height: 100vh;
    background: var(--white);
  }

  /* ===================== PANEL IZQUIERDO ===================== */
  .panel-left {
    width: 50%;
    background: var(--green-dark);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px;
    position: relative;
    overflow: hidden;
  }

  /* Círculos concéntricos decorativos */
  .circles {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .circles span {
    position: absolute;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.1);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .circles span:nth-child(1) { width: 220px; height: 220px; }
  .circles span:nth-child(2) { width: 340px; height: 340px; }
  .circles span:nth-child(3) { width: 460px; height: 460px; }
  .circles span:nth-child(4) { width: 580px; height: 580px; }

  /* Brand */
  .brand {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    margin-bottom: 40px;
  }

  .brand-logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .brand-icon {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: 2.5px solid rgba(255,255,255,0.6);
    background: var(--green-main);
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .brand-icon::after {
    content: '';
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--yellow);
    border: 3px solid rgba(255,255,255,0.4);
    position: absolute;
  }

  .brand-name {
    color: white;
    font-size: 30px;
    font-weight: 800;
    letter-spacing: 2px;
  }
  .brand-name span { color: var(--yellow); }

  .brand-tagline {
    color: var(--yellow);
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.5px;
    opacity: 0.9;
  }

  /* Bus ilustración SVG */
  .bus-illustration {
    position: relative;
    z-index: 2;
    width: 260px;
    margin-bottom: 32px;
    animation: float 4s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-10px); }
  }

  /* Ruta punteada con puntos animados */
  .route-line {
    position: relative;
    z-index: 2;
    width: 260px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 4px;
    margin-top: -12px;
  }
  .route-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--yellow);
    animation: pulse-dot 2s ease-in-out infinite;
  }
  .route-dot:nth-child(2) { animation-delay: 0.4s; }
  .route-dot:nth-child(3) { animation-delay: 0.8s; }
  .route-dash {
    flex: 1;
    height: 2px;
    border-top: 2px dashed rgba(255,255,255,0.3);
  }
  @keyframes pulse-dot {
    0%, 100% { transform: scale(1); opacity: 1; }
    50%       { transform: scale(1.4); opacity: 0.7; }
  }

  /* ===================== PANEL DERECHO ===================== */
  .panel-right {
    width: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 64px;
    background: var(--white);
  }

  .login-box {
    width: 100%;
    max-width: 440px;
  }

  .login-title {
    font-size: 28px;
    font-weight: 800;
    color: var(--text-main);
    margin-bottom: 6px;
    letter-spacing: -0.3px;
  }
  .login-sub {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 36px;
  }

  /* Form */
  .form-group {
    margin-bottom: 18px;
  }
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-main);
    margin-bottom: 7px;
  }
  .input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }
  .input-wrap svg.icon-left {
    position: absolute;
    left: 14px;
    width: 18px; height: 18px;
    color: var(--text-muted);
    pointer-events: none;
    flex-shrink: 0;
  }
  .input-wrap input {
    width: 100%;
    height: 50px;
    border: 1.5px solid var(--gray-border);
    border-radius: 12px;
    padding: 0 44px 0 44px;
    font-size: 14px;
    color: var(--text-main);
    background: var(--gray-bg);
    outline: none;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
  }
  .input-wrap input:focus {
    border-color: var(--green-main);
    background: white;
    box-shadow: 0 0 0 3px rgba(42,122,59,0.1);
  }
  .input-wrap input.error {
    border-color: var(--red);
    box-shadow: 0 0 0 3px rgba(231,76,60,0.1);
  }
  .input-wrap input::placeholder { color: #b0b0aa; }

  /* Toggle password */
  .btn-toggle-pass {
    position: absolute; right: 14px;
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); padding: 0;
    display: flex; align-items: center;
    transition: color 0.15s;
  }
  .btn-toggle-pass:hover { color: var(--green-main); }
  .btn-toggle-pass svg { width: 18px; height: 18px; }

  /* Forgot password */
  .forgot-link {
    display: block;
    text-align: right;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--green-main);
    text-decoration: none;
    margin-top: 8px;
    transition: color 0.15s;
  }
  .forgot-link:hover { color: var(--green-dark); text-decoration: underline; }

  /* Rol selector */
  .rol-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-main);
    margin-bottom: 10px;
    display: block;
  }
  .rol-group {
    display: flex;
    gap: 10px;
    margin-bottom: 28px;
  }
  .rol-btn {
    flex: 1;
    height: 42px;
    border: 1.5px solid var(--gray-border);
    border-radius: 10px;
    background: var(--gray-bg);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .rol-btn:hover {
    border-color: var(--green-main);
    color: var(--green-main);
    background: var(--green-light);
  }
  .rol-btn.active {
    border-color: var(--green-main);
    background: var(--green-light);
    color: var(--green-dark);
    font-weight: 700;
  }

  /* Error message */
  .error-msg {
    font-size: 11.5px;
    color: var(--red);
    margin-top: 5px;
    display: none;
  }
  .error-msg.show { display: block; }

  /* Alert global */
  .alert-box {
    background: #fdecea;
    border: 1px solid #f5c6cb;
    color: #842029;
    border-radius: 10px;
    padding: 11px 14px;
    font-size: 13px;
    margin-bottom: 18px;
    display: none;
  }
  .alert-box.show { display: block; }

  /* Submit */
  .btn-login {
    width: 100%;
    height: 52px;
    background: var(--green-dark);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.3px;
    position: relative;
    overflow: hidden;
  }
  .btn-login:hover:not(:disabled) { background: #133f1d; transform: translateY(-1px); }
  .btn-login:active:not(:disabled) { transform: translateY(0); }
  .btn-login:disabled { opacity: 0.7; cursor: not-allowed; }

  .btn-login .spinner {
    display: none;
    width: 18px; height: 18px;
    border: 2.5px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    position: absolute;
    right: 20px; top: 50%;
    transform: translateY(-50%);
  }
  .btn-login.loading .spinner { display: block; }
  @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }

  /* Footer */
  .login-footer {
    text-align: center;
    margin-top: 28px;
    font-size: 12px;
    color: var(--text-muted);
  }

  /* Responsive */
  @media (max-width: 768px) {
    .panel-left { display: none; }
    .panel-right { width: 100%; padding: 40px 24px; }
  }
</style>
</head>
<body>

<!-- ===== PANEL IZQUIERDO ===== -->
<div class="panel-left">
  <div class="circles">
    <span></span><span></span><span></span><span></span>
  </div>

  <div class="brand">
    <div class="brand-logo">
      <div class="brand-icon"></div>
      <span class="brand-name">FLO<span>TRANS</span></span>
    </div>
    <span class="brand-tagline">Transportamos con amor</span>
  </div>

  <!-- Bus SVG illustration -->
  <svg class="bus-illustration" viewBox="0 0 260 160" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Cuerpo principal -->
    <rect x="20" y="40" width="220" height="90" rx="14" stroke="white" stroke-width="3" fill="none"/>
    <!-- Techo redondeado -->
    <path d="M34 40 Q130 16 226 40" stroke="white" stroke-width="3" fill="none"/>
    <!-- Ventanas -->
    <rect x="38" y="55" width="42" height="34" rx="6" stroke="white" stroke-width="2.5" fill="none"/>
    <rect x="92"  y="55" width="42" height="34" rx="6" stroke="white" stroke-width="2.5" fill="none"/>
    <rect x="146" y="55" width="42" height="34" rx="6" stroke="white" stroke-width="2.5" fill="none"/>
    <!-- Puerta -->
    <rect x="196" y="62" width="30" height="40" rx="4" stroke="white" stroke-width="2.5" fill="none"/>
    <line x1="211" y1="62" x2="211" y2="102" stroke="white" stroke-width="1.5"/>
    <!-- Ruedas -->
    <circle cx="68"  cy="133" r="18" stroke="white" stroke-width="3" fill="none"/>
    <circle cx="68"  cy="133" r="7"  stroke="white" stroke-width="2" fill="none"/>
    <circle cx="192" cy="133" r="18" stroke="white" stroke-width="3" fill="none"/>
    <circle cx="192" cy="133" r="7"  stroke="white" stroke-width="2" fill="none"/>
    <!-- Faro delantero -->
    <rect x="22" y="72" width="10" height="16" rx="3" fill="rgba(240,201,58,0.8)"/>
    <!-- Faro trasero -->
    <rect x="228" y="72" width="10" height="16" rx="3" fill="rgba(240,201,58,0.5)"/>
    <!-- Punto amarillo logo en bus -->
    <circle cx="130" cy="28" r="5" fill="#f0c93a"/>
  </svg>

  <!-- Ruta con puntos -->
  <div class="route-line">
    <div class="route-dot"></div>
    <div class="route-dash"></div>
    <div class="route-dot"></div>
    <div class="route-dash"></div>
    <div class="route-dot"></div>
  </div>
</div>

<!-- ===== PANEL DERECHO ===== -->
<div class="panel-right">
  <div class="login-box">
    <h1 class="login-title">Bienvenido de nuevo</h1>
    <p class="login-sub">Ingresa tus credenciales para acceder</p>

    <div class="alert-box" id="alertBox"></div>

    <div class="form-group">
      <label for="correo">Correo electrónico</label>
      <div class="input-wrap">
        <svg class="icon-left" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" stroke-width="1.8"/>
          <polyline points="22,6 12,13 2,6" stroke-width="1.8"/>
        </svg>
        <input type="email" id="correo" placeholder="tu@email.com" autocomplete="email">
      </div>
      <span class="error-msg" id="eCorreo">Ingresa un correo válido</span>
    </div>

    <div class="form-group">
      <label for="contrasena">Contraseña</label>
      <div class="input-wrap">
        <svg class="icon-left" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke-width="1.8"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke-width="1.8"/>
        </svg>
        <input type="password" id="contrasena" placeholder="••••••••" autocomplete="current-password">
        <button type="button" class="btn-toggle-pass" onclick="togglePass()" id="btnToggle" aria-label="Ver contraseña">
          <svg id="eyeIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke-width="1.8"/>
            <circle cx="12" cy="12" r="3" stroke-width="1.8"/>
          </svg>
        </button>
      </div>
      <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
      <span class="error-msg" id="ePass">La contraseña es obligatoria</span>
    </div>

    <span class="rol-label">Selecciona tu rol</span>
    <div class="rol-group" id="rolGroup">
      <button class="rol-btn active" data-rol="administrador" onclick="selRol(this)">Administrador</button>
      <button class="rol-btn" data-rol="operador"       onclick="selRol(this)">Operador</button>
      <button class="rol-btn" data-rol="conductor"      onclick="selRol(this)">Conductor</button>
    </div>

    <button class="btn-login" id="btnLogin" onclick="iniciarSesion()">
      Iniciar sesión
      <span class="spinner"></span>
    </button>

    <p class="login-footer">Versión del sistema v1.0 | © FloTrans 2026</p>
  </div>
</div>

<script>
  // =====================================================
  // CONFIG — ajusta la URL si cambia la ruta
  // =====================================================
  const AUTH_URL = "http://localhost/flotrans/api/auth.php";

  let rolSeleccionado = 'administrador';

  // ---- Toggle contraseña ----
  function togglePass() {
    const inp = document.getElementById('contrasena');
    const icon = document.getElementById('eyeIcon');
    const visible = inp.type === 'password';
    inp.type = visible ? 'text' : 'password';
    icon.innerHTML = visible
      ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" stroke-width="1.8"/><line x1="1" y1="1" x2="23" y2="23" stroke-width="1.8"/>`
      : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke-width="1.8"/><circle cx="12" cy="12" r="3" stroke-width="1.8"/>`;
  }

  // ---- Seleccionar rol ----
  function selRol(btn) {
    document.querySelectorAll('.rol-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    rolSeleccionado = btn.dataset.rol;
  }

  // ---- Validación ----
  function validar() {
    let ok = true;
    const correo = document.getElementById('correo').value.trim();
    const pass   = document.getElementById('contrasena').value;

    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(correo)) {
      document.getElementById('eCorreo').classList.add('show');
      document.getElementById('correo').classList.add('error');
      ok = false;
    } else {
      document.getElementById('eCorreo').classList.remove('show');
      document.getElementById('correo').classList.remove('error');
    }

    if (!pass) {
      document.getElementById('ePass').classList.add('show');
      document.getElementById('contrasena').classList.add('error');
      ok = false;
    } else {
      document.getElementById('ePass').classList.remove('show');
      document.getElementById('contrasena').classList.remove('error');
    }

    return ok;
  }

  // ---- Iniciar sesión ----
  async function iniciarSesion() {
    document.getElementById('alertBox').classList.remove('show');
    if (!validar()) return;

    const btn = document.getElementById('btnLogin');
    btn.disabled = true;
    btn.classList.add('loading');
    btn.childNodes[0].textContent = 'Verificando…';

    const payload = {
      correo:    document.getElementById('correo').value.trim(),
      contrasena: document.getElementById('contrasena').value,
      rol:       rolSeleccionado,
    };

    try {
      const res  = await fetch(AUTH_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await res.json();

      if (!res.ok || data.error) {
        mostrarAlerta(data.error || 'Credenciales incorrectas. Intenta de nuevo.');
        btn.disabled = false;
        btn.classList.remove('loading');
        btn.childNodes[0].textContent = 'Iniciar sesión';
        return;
      }

      // Guardar sesión en sessionStorage
      sessionStorage.setItem('flotrans_user', JSON.stringify(data.usuario));

      // Redirigir según el rol
      const destinos = {
        administrador: 'dashboard.html',
        operador:      'dashboard.html',
        conductor:     'conductor_panel.html',   // Página futura del conductor
      };
      window.location.href = destinos[data.usuario.rol] || 'dashboard.html';

    } catch (e) {
      mostrarAlerta('No se pudo conectar con el servidor. Verifica que XAMPP esté activo.');
      btn.disabled = false;
      btn.classList.remove('loading');
      btn.childNodes[0].textContent = 'Iniciar sesión';
    }
  }

  function mostrarAlerta(msg) {
    const el = document.getElementById('alertBox');
    el.textContent = msg;
    el.classList.add('show');
  }

  // Enter para submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') iniciarSesion();
  });
</script>
</body>
</html>
